<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Black Stars CRM — Sports Club</title>
<link rel="icon" type="image/jpeg" href="logo.jpg" />
<!-- Premium typography: Plus Jakarta Sans for UI text, JetBrains Mono for numerals.
     If offline (CDN unreachable), the CSS font-family falls back to system fonts. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<noscript>
  <div style="padding:40px;font-family:system-ui;color:#fff;background:#0a0e1a;height:100vh">
    <h1>JavaScript required</h1>
    <p>This app needs JavaScript enabled in your browser. Please enable it and reload.</p>
  </div>
</noscript>

<!-- 1. Firebase SDK (compat build for simplicity — works as window.firebase global) -->
<!-- These load from Google's CDN. If offline, app falls back to localStorage automatically. -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<!-- 2. Firebase configuration (EDIT firebase-config.js to enable cloud sync) -->
<script src="firebase-config.js"></script>

<!-- 3. Storage abstraction (chooses Firebase or localStorage based on config) -->
<script src="storage.js"></script>

<!-- 4. Seed data (used only if explicitly loaded via "Load demo data") -->
<script src="seed-embed.js"></script>

<!-- 5. xlsx parser (minimal, pure-JS, browser-only) -->
<script src="xlsx-mini.js"></script>
<script src="xlsx-mini-write.js"></script>

<!-- 6. Core app -->
<script src="app.js"></script>

<!-- 7. Page renderers (use registry from app.js) -->
<script src="pages.js"></script>
</body>
</html>
