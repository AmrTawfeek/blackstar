<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Black Stars CRM — Sports Club</title>
<link rel="icon" type="image/jpeg" href="logo.jpg" />
<!-- Premium typography: Plus Jakarta Sans for UI text, JetBrains Mono for numerals.
     If offline (CDN unreachable), the CSS font-family falls back to system fonts. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=6.366.0" />
</head>
<body>
<noscript>
  <div style="padding:40px;font-family:system-ui;color:#fff;background:#0a0e1a;height:100vh">
    <h1>JavaScript required</h1>
    <p>This app needs JavaScript enabled in your browser. Please enable it and reload.</p>
  </div>
</noscript>

<!-- Boot splash (v6.352): shown INSTANTLY by the browser, before any script runs, so the screen
     is never blank while the app connects to the cloud (the first Firestore read can take a
     second or two, especially on a cold/expired session). Any real screen the app renders wipes
     the body, which removes this automatically. -->
<div id="boot-splash" style="position:fixed;inset:0;z-index:2147483000;background:#0f1115;color:#e7ebf2;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,sans-serif">
  <div style="width:52px;height:52px;border:4px solid rgba(120,120,140,.25);border-top-color:#f2a33c;border-radius:50%;animation:bootspin .8s linear infinite"></div>
  <div style="margin-top:18px;font-size:17px;font-weight:800;letter-spacing:.3px">★ Black Stars CRM</div>
  <div style="margin-top:6px;font-size:13px;color:#9aa4b2">Loading… · جاري التحميل…</div>
  <style>@keyframes bootspin{to{transform:rotate(360deg)}}</style>
</div>

<!-- 1. Firebase SDK (compat build for simplicity — works as window.firebase global) -->
<!-- These load from Google's CDN. If offline, app falls back to localStorage automatically. -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<!-- 2. Firebase configuration (EDIT firebase-config.js to enable cloud sync) -->
<script src="firebase-config.js?v=6.366.0"></script>

<!-- 3. Storage abstraction (chooses Firebase or localStorage based on config) -->
<script src="storage.js?v=6.366.0"></script>

<!-- 4. Seed data (used only if explicitly loaded via "Load demo data") -->
<script src="seed-embed.js?v=6.366.0"></script>

<!-- 5. xlsx parser (minimal, pure-JS, browser-only) -->
<script src="xlsx-mini.js?v=6.366.0"></script>
<script src="xlsx-mini-write.js?v=6.366.0"></script>

<!-- 6. Core app -->
<script src="app.js?v=6.366.0"></script>

<!-- 7. Page renderers (use registry from app.js) -->
<script src="pages.js?v=6.366.0"></script>
</body>
</html>
