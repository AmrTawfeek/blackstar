name: Deploy Client Update Auto

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'Direct Link to the ZIP file'
        required: true
        type: string
      commit_message:
        description: 'Commit Message'
        required: false
        default: 'Client Update via Cloud'

permissions:
  contents: write

jobs:
  update-code:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download Zip File
      run: |
        URL="${{ github.event.inputs.zip_url }}"
        if [[ "$URL" == *"dropbox.com"* ]]; then
          URL=$(echo "$URL" | sed 's/dl=0/dl=1/')
        fi
        echo "Downloading from: $URL"
        curl -L -o client_project.zip "$URL"

    - name: Extract Zip
      run: |
        mkdir -p temp_extract
        unzip -qo client_project.zip -d ./temp_extract || true

    - name: Remove Firebase Config
      run: |
        # حذف الملف بأمر صريح مباشر ومؤمن تماماً
        rm -f ./temp_extract/firebase-config.js || true
        find ./temp_extract -name "firebase-config.js" -exec rm -f {} + || true
        echo "Firebase config safely checked."

    - name: Copy Files & Clean
      run: |
        cp -r ./temp_extract/* . || true
        rm -rf ./temp_extract || true
        rm -f client_project.zip || true

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        if ! git diff-index --quiet HEAD; then
          git commit -m "${{ github.event.inputs.commit_message }}"
          git push origin main
        else
          echo "No changes detected."
        fi