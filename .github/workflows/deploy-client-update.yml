name: Deploy Client Update Auto

# السكريبت هيشتغل يدوياً بضغطة زرار من صفحة GitHub (أو تقدر تربطه بـ Webhook لاحقاً)
on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'Direct Link to the ZIP file'
        required: true
        type: string
      commit_message:
        description: 'Commit Message'
        required: false
        default: 'Client Update via Cloud'

jobs:
  update-code:
    runs-on: ubuntu-latest

    steps:
    # 1. فتح المشروع الحالي على سيرفر جيتهاب
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # 2. تحميل الملف المضغوط من الرابط اللي هيدخله العميل
    - name: Download Zip File
      run: |
        curl -L -o client_project.zip "${{ github.event.inputs.zip_url }}"

    # 3. فك الضغط جوه فولدر مؤقت
    - name: Extract Zip
      run: |
        mkdir -p temp_extract
        unzip -o client_project.zip -d ./temp_extract

    # 4. حذف ملف الـ Firebase لحماية إعداداتك
    - name: Remove Firebase Config
      run: |
        rm -f ./temp_extract/firebase-config.js
        # لو الملف جوه فولدر فرعي، عدل المسار هنا (مثلاً ./temp_extract/src/...)

    # 5. نقل الملفات للمشروع وحذف الملفات المؤقتة
    - name: Copy Files & Clean
      run: |
        cp -r ./temp_extract/* .
        rm -rf ./temp_extract
        rm -f client_project.zip

    # 6. عمل Commit و Push للتعديلات تلقائياً على ريبو الـ GitHub
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        # التأكد من وجود تغييرات حقيقية قبل عمل الـ commit عشان السكريبت ميفشلش
        git diff-index --quiet HEAD || (git commit -m "${{ github.event.inputs.commit_message }}" && git push origin main)